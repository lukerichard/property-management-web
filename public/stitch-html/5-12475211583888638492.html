<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARC Property Ops — Brand Hero</title>
  <style>
    :root { --navy:#123A56; --bg:#F3F5F1; --muted:#6F7A83; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Inter, Montserrat, system-ui, -apple-system, Segoe UI, sans-serif; background: var(--bg); color: var(--navy); min-height:100vh; }
    .grain { position: fixed; inset: 0; background: radial-gradient(circle at 20% 10%, #f7f8f6 0%, #f1f3ef 45%, #eff1ed 100%); }
    .hero { position:relative; z-index:1; min-height:100vh; display:grid; place-items:center; padding:32px; }
    .logo-stack { text-align:center; }
    .mark { width:120px; margin: 0 auto 18px; display:block; }
    .arc { font-size: clamp(64px, 12vw, 140px); letter-spacing: 0.04em; line-height: .95; font-weight: 700; margin:0; }
    .sub { margin-top: 16px; color: var(--muted); letter-spacing: .35em; font-size: 14px; text-transform: uppercase; }
    .dot { position: fixed; right: 32px; bottom: 28px; width: 12px; height: 12px; border:1px solid #d9dddf; transform: rotate(45deg); }
  </style>
</head>
<body>
  <div class="grain"></div>
  <main class="hero">
    <section class="logo-stack" aria-label="ARC brand hero">
      <svg class="mark" viewBox="0 0 120 80" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 54C21 36 37 22 58 22C79 22 96 36 101 54" stroke="#123A56" stroke-width="5" stroke-linecap="round"/>
        <path d="M38 56V42L58 30L78 42V56" stroke="#123A56" stroke-width="4" stroke-linejoin="round"/>
      </svg>
      <h1 class="arc">ARC</h1>
      <p class="sub">Property Ops</p>
    </section>
  </main>
  <span class="dot" aria-hidden="true"></span>
</body>
</html>
